<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026爱习集团战果实时报告</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="dashboard-page">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <svg class="horse-bg" viewBox="0 0 900 520" aria-hidden="true">
    <path d="M124 313 C112 246, 168 178, 230 181 C264 140, 322 123, 381 137 C448 125, 517 152, 556 210 C620 204, 669 238, 684 301 C697 358, 666 402, 615 416 C584 451, 532 469, 484 459 C431 483, 368 483, 319 461 C255 472, 196 444, 166 398 C136 385, 118 350, 124 313 Z"/>
    <path d="M538 208 C585 197, 624 153, 645 116 C669 75, 706 55, 751 52"/>
  </svg>

  <header class="hero">
    <div>
      <p class="year">2026</p>
      <h1>爱习集团战果实时报告</h1>
      <p class="strategy">三年二十校</p>
      <p class="role-badge" id="roleBadge">身份：未验证</p>
    </div>
  </header>

  <main class="dashboard-wrap">
    <section class="card podium-card" id="sectionPodium" data-scope="partner">
      <h2>最高的山</h2>
      <div id="podium" class="podium"></div>
    </section>

    <section class="card" id="sectionCampus" data-scope="partner">
      <h2>校区排名</h2>
      <div id="campusTable"></div>
    </section>

    <section class="card" id="sectionMarket" data-scope="partner,market">
      <h2>市场部排名</h2>
      <div class="split-grid">
        <div id="marketTable"></div>
        <div class="chart-box">
          <h3>全款人数占比</h3>
          <canvas id="marketPie" width="360" height="360"></canvas>
          <div id="pieLegend" class="pie-legend"></div>
        </div>
      </div>
    </section>

    <section class="card" id="sectionCoach" data-scope="partner,market">
      <h2>教练排名</h2>
      <div id="coachTable"></div>
    </section>

    <section class="card" id="sectionSupervisor" data-scope="partner,market">
      <h2>主管排名</h2>
      <div id="supervisorTable"></div>
    </section>

    <section class="card" id="sectionTeaching" data-scope="partner,teaching">
      <h2>教学部排名</h2>
      <div id="teachingTable"></div>
    </section>

    <section class="card" id="sectionTeacher" data-scope="partner,teaching">
      <h2>教师排名</h2>
      <div id="teacherTable"></div>
      <h3 class="sub-title">教师续课「赢在职场」</h3>
      <div id="teacherCourseTable"></div>
      <h3 class="sub-title">合伙人达标进度</h3>
      <div id="partnerProgressTable"></div>
    </section>
  </main>

  <footer class="report-date" id="reportDate"></footer>

  <div class="bottom-actions">
    <button class="role-entry" id="roleEntry" type="button">切换身份</button>
    <a class="admin-entry" href="./admin.html" title="教务填报入口">教务入口</a>
  </div>

  <div class="role-modal hidden" id="roleModal">
    <div class="role-panel">
      <h3>岗位身份验证</h3>
      <p>合伙人可查看全部数据；市场部可查看市场/教练/主管；教学部可查看教学/教师/赢在职场。</p>
      <label>岗位
        <select id="roleSelect">
          <option value="partner">合伙人（校长/市场总监/教学总监）</option>
          <option value="market">市场部</option>
          <option value="teaching">教学部</option>
        </select>
      </label>
      <label>访问密码
        <input id="rolePassword" type="password" placeholder="请输入岗位访问密码" />
      </label>
      <button type="button" id="roleConfirm">进入仪表盘</button>
      <p class="msg" id="roleMsg"></p>
    </div>
  </div>

  <script src="./data.js"></script>
  <script src="./dashboard.js"></script>
</body>
</html>
